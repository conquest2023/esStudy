name: CI (frontend/backend split)

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure base branch is fetched
        run: |
          git fetch --no-tags --prune origin +refs/heads/*:refs/remotes/origin/*

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
          ref:  ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          filters: |
            frontend:
              - 'vue-project/**'
              - 'package.json'   
              - 'package-lock.json'  
            backend:
              - 'src/**'
              - 'build.gradle*'
              - 'gradle/**'
              - 'settings.gradle*'

  # 2) 프론트엔드 빌드 및 파일 업로드
  frontend:
    needs: changes
    # 프론트 해시값이 바뀌면 백엔드 JAR도 새로 구워야 하므로 실행 조건 수정
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: wngud1/vue-frontend
    outputs:
      image_tag: ${{ steps.pick.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue-project/package-lock.json

      - name: Install
        working-directory: vue-project
        run: npm ci

      - name: Build
        working-directory: vue-project
        run: npm run build

      - name: Upload index.html for Backend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-index
          path: vue-project/dist/index.html

      - name: Pick primary tag (safe)
        id: pick
        run: echo "tag=${IMAGE_REPO}:main-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (Docker)
        uses: docker/build-push-action@v6
        with:
          context: ./vue-project
          file: ./vue-project/Dockerfile
          push: true
          tags: ${{ steps.pick.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max

  # 3) 백엔드 빌드 (정적 파일 동기화 포함)
  backend:
    needs: [changes, frontend]
    # 프론트엔드가 바뀌어도 백엔드 JAR를 다시 구워야 함
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: wngud1/hoeng
    outputs:
      image_tag: ${{ steps.pick.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Frontend index.html
        uses: actions/download-artifact@v4
        with:
          name: frontend-index
          path: temp-dist

      # [수정] 템플릿의 Thymeleaf 태그는 살리고 파일명만 치환함
      - name: Sync Frontend Assets to Backend
        run: |
          mkdir -p src/main/resources/templates
          NEW_JS=$(grep -o 'index-[a-zA-Z0-9_-]\+\.js' temp-dist/index.html | head -n 1)
          NEW_CSS=$(grep -o 'index-[a-zA-Z0-9_-]\+\.css' temp-dist/index.html | head -n 1)
          
          echo "Syncing JS: $NEW_JS"
          echo "Syncing CSS: $NEW_CSS"

          # 이 파일이 src/main/resources/templates/ 안에 실제 파일로 존재해야 함
          if [ -f "src/main/resources/templates/robot-meta.html" ]; then
            sed -i "s/index-[a-zA-Z0-9_-]\+\.js/$NEW_JS/g" src/main/resources/templates/robot-meta.html
            sed -i "s/index-[a-zA-Z0-9_-]\+\.css/$NEW_CSS/g" src/main/resources/templates/robot-meta.html
            echo "robot-meta.html hashes updated."
          fi

          cp temp-dist/index.html src/main/resources/templates/index.html

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle Test & Build (jar)
        run: ./gradlew clean test bootJar --no-daemon

      - name: Pick primary tag (safe)
        id: pick
        run: echo "tag=${IMAGE_REPO}:main-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (Docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.pick.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max

  # 4) 매니페스트 업데이트
  bump-manifest:
    needs: [frontend, backend]
    if: ${{ always() && (needs.frontend.result == 'success' || needs.backend.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: conquest2023/worklyCD
          path: worklyCD
          ref: main
          token: ${{ secrets.CD_REPO_TOKEN }}

      - name: Install yq v4
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update images in manifests
        working-directory: worklyCD
        env:
          FRONT_IMAGE: ${{ needs.frontend.outputs.image_tag }}
          BACK_IMAGE:  ${{ needs.backend.outputs.image_tag }}
        run: |
          if [ -n "$FRONT_IMAGE" ]; then
            yq -i '(. | select(.kind=="Deployment" and .metadata.name=="vue-frontend") | .spec.template.spec.containers[] | select(.name=="vue").image) = env(FRONT_IMAGE)' cd/front-pod.yaml
          fi
          if [ -n "$BACK_IMAGE" ]; then
            yq -i '(. | select(.kind=="Deployment" and .metadata.name=="deploy-https") | .spec.template.spec.containers[] | select(.name=="container").image) = env(BACK_IMAGE)' cd/backend-pod.yaml
          fi

      - name: Commit & Push to CD repo
        working-directory: worklyCD
        run: |
          git config user.name  "gha-bot"
          git config user.email "gha-bot@users.noreply.github.com"
          git add cd/*.yaml
          git commit -m "chore: sync frontend hashes and bump images" || exit 0
          git remote set-url origin "https://x-access-token:${{ secrets.CD_REPO_TOKEN }}@github.com/conquest2023/worklyCD.git"
          git push origin HEAD:main