name: CI (frontend/backend split)

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1) 변경 감지
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure base branch is fetched
        run: |
          git fetch --no-tags --prune origin +refs/heads/*:refs/remotes/origin/*

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
          ref:  ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          filters: |
            frontend:
              - 'vue-project/**'
              - 'package.json'   
              - 'package-lock.json'  
            backend:
              - 'src/**'
              - 'build.gradle*'
              - 'gradle/**'
              - 'settings.gradle*'

  # 2) 프론트엔드 빌드 및 이미지 푸시
  frontend:
    needs: changes
    # 백엔드만 바뀌었더라도 프론트엔드 index.html 공유를 위해 실행하는 것이 안전함
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: wngud1/vue-frontend
    outputs:
      image_tag: ${{ steps.pick.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue-project/package-lock.json

      - name: Install
        working-directory: vue-project
        run: npm ci

      - name: Build
        working-directory: vue-project
        run: npm run build

      # [핵심] 빌드된 index.html을 Artifact로 업로드하여 백엔드와 공유
      - name: Upload index.html for Backend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: vue-project/dist/index.html

      - name: Pick primary tag
        id: pick
        run: echo "tag=${IMAGE_REPO}:main-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (Docker)
        uses: docker/build-push-action@v6
        with:
          context: ./vue-project
          file: ./vue-project/Dockerfile
          push: true
          tags: ${{ steps.pick.outputs.tag }}

  # 3) 백엔드 빌드 (프론트 결과물 포함) 및 이미지 푸시
  backend:
    needs: [changes, frontend]
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: wngud1/hoeng
    outputs:
      image_tag: ${{ steps.pick.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # [핵심] 프론트엔드에서 빌드한 최신 index.html 다운로드
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: temp-dist

      # [핵심] 백엔드 템플릿 경로로 복사 (해시값 동기화)
      - name: Sync HTML to Backend Templates
        run: |
          mkdir -p src/main/resources/templates
          cp temp-dist/index.html src/main/resources/templates/index.html
          cp temp-dist/index.html src/main/resources/templates/robot-meta.html
          echo "최신 해시가 포함된 HTML 동기화 완료"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle Test & Build (jar)
        run: ./gradlew clean test bootJar --no-daemon

      - name: Pick primary tag
        id: pick
        run: echo "tag=${IMAGE_REPO}:main-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (Docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.pick.outputs.tag }}

  # 4) CD 레포 업데이트
  bump-manifest:
    needs: [frontend, backend]
    if: ${{ always() && (needs.frontend.result == 'success' || needs.backend.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: conquest2023/worklyCD
          path: worklyCD
          token: ${{ secrets.CD_REPO_TOKEN }}

      - name: Update images in manifests
        working-directory: worklyCD
        run: |
          # (기존 yq 업데이트 로직 유지)
          # ... 생략 (이미지 태그 업데이트 부분) ...

      - name: Commit & Push to CD repo
        working-directory: worklyCD
        run: |
          git config user.name  "gha-bot"
          git config user.email "gha-bot@users.noreply.github.com"
          git add cd/*.yaml
          git commit -m "chore: bump image tag to latest build" || exit 0
          git remote set-url origin "https://x-access-token:${{ secrets.CD_REPO_TOKEN }}@github.com/conquest2023/worklyCD.git"
          git push origin HEAD:main