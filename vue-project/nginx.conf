# http {
#   include       /etc/nginx/mime.types;
#   default_type  application/octet-stream;
#   charset       utf-8;
#
#   sendfile        on;
#   tcp_nopush      on;
#   tcp_nodelay     on;
#   keepalive_timeout  65;
#   client_max_body_size 30M;
#   gzip on;
#   gzip_comp_level 6;
#   gzip_min_length 1024;
#   gzip_proxied any;
#   gzip_vary on;
#   gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss image/svg+xml;

  # 메인 설정 (http 블록 내부 또는 개별 server 설정 파일)
  server {
      listen 80;
      server_name workly.info localhost;

      root  /usr/share/nginx/html;
      index index.html;

      client_max_body_size 50M;

      location /api/ {
#           proxy_pass http://svc-https:8080;

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_cache_bypass $http_upgrade;

          # 타임아웃 설정 강화
          proxy_read_timeout 60s;
          proxy_connect_timeout 5s;
          proxy_send_timeout 60s;

          # proxy_intercept_errors on;
      }

      # [수정] /api/ 경로의 .json 요청과 충돌하지 않도록 설정
      location ~* /(?!api/).*\.(webmanifest|json)$ {
          root /usr/share/nginx/html;
          add_header Content-Type application/manifest+json;
          add_header Cache-Control "no-cache";
      }

      # 3. 서비스 워커 (캐시 방지)
      location = /sw.js {
          root /usr/share/nginx/html;
          add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
      }

      # 4. 정적 자원 (Assets) 캐싱
      location /assets/ {
          root /usr/share/nginx/html;
          access_log off;
          add_header Cache-Control "public, max-age=2592000, immutable";
          add_header Vary "Accept-Encoding";
          try_files $uri =404;
      }

      # 5. 미디어 파일 캐싱
      location ~* \.(?:woff2?|png|jpe?g|gif|webp|ico|svg)$ {
          access_log off;
          add_header Cache-Control "public, max-age=604800";
          try_files $uri =404;
      }

      # 6. 메인 페이지 (index.html)
      location = /index.html {
          add_header Cache-Control "no-cache, no-store, must-revalidate";
          try_files $uri =404;
      }

      # 7. SPA 라우팅 지원
      # [중요] /api/로 시작하지 않는 모든 요청을 index.html로 보냄
      location / {
          try_files $uri $uri/ /index.html;
      }

      # 보안 및 기타 헤더
      charset utf-8;
      add_header X-Content-Type-Options nosniff always;
      add_header Referrer-Policy strict-origin-when-cross-origin always;
  }
